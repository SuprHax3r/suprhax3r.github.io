<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrmPunch Live Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" class="logo" alt="StrmPunch logo">
        <div>
            <h1>StrmPunch Live</h1>
            <p class="tagline">Demo chat and streaming showcase</p>
        </div>
    </header>

    <main class="container">
        <section class="video" aria-label="Live video preview">
            <div class="live">• LIVE</div>
            <div class="video-player">
                <video id="streamVideo" class="stream-video" autoplay muted loop playsinline preload="auto" poster="Fail screeen.png">
                    <source src="Grief2.mp4" type="video/mp4">
                    Your browser does not support the video element.
                </video>
                <button id="playOverlay" class="play-overlay" aria-label="Play video" hidden>Play</button>
                <div id="videoError" class="video-error" role="status" aria-live="polite" hidden></div>
            </div>
            <h2>Strm exemplar: Zoink</h2>
        </section>

        <aside class="chat" aria-labelledby="chat-heading">
            <h3 id="chat-heading">Live Chat:</h3>
            <div id="messages" class="messages" role="log" aria-live="polite">
                <div class="msg"><strong>KnicksLuver:</strong> #### Trae Young 🥀</div>
                <div class="msg"><strong>Zoink:</strong> Welcome to StrmPunch 👊</div>
            </div>

            <div class="input-row">
                <label for="chatInput" class="sr-only">Type your message</label>
                <input id="chatInput" type="text" placeholder="Send a message..." aria-label="Send a message">
                <button type="button" id="sendButton">Send</button>
            </div>
        </aside>
    </main>

    <script src="script.js" defer></script>
    <footer>
        <p>&copy; 2026 StrmPunch. All rights reserved.</p>
    </footer>
</body>
</html>
